<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mirkay-AI | Pro v3.2</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <style>
        :root { --bg: #050505; --sidebar: #0d0d0d; --accent: #fff; --text: #ececec; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

        /* Sol Panel */
        #sidebar { width: 260px; background: var(--sidebar); display: flex; flex-direction: column; border-right: 1px solid #222; }
        .new-chat { margin: 15px; padding: 12px; border: 1px solid #333; border-radius: 8px; text-align: center; cursor: pointer; font-size: 14px; font-weight: bold; }
        .chat-list { flex: 1; overflow-y: auto; padding: 10px; }
        .chat-item { padding: 12px; margin-bottom: 5px; border-radius: 8px; font-size: 13px; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chat-item:hover { background: #161616; }

        /* Ana Alan */
        #main { flex: 1; display: flex; flex-direction: column; position: relative; width: 100%; }
        .header { height: 60px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; background: #050505; z-index: 500; }
        
        .profile-container { position: relative; }
        .profile-btn { width: 38px; height: 38px; border-radius: 50%; background: #fff; color: #000; border: none; font-weight: bold; cursor: pointer; }
        .dropdown { position: absolute; top: 50px; right: 0; background: #151515; border: 1px solid #333; border-radius: 12px; width: 200px; display: none; flex-direction: column; z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .dropdown.active { display: flex; }
        .drop-item { padding: 14px; font-size: 13px; text-align: left; background: none; color: #fff; border: none; border-bottom: 1px solid #222; cursor: pointer; width: 100%; }
        .drop-item:hover { background: #222; }

        /* Sağ Panel (E-posta Yönetimi) */
        #email-panel { position: fixed; right: -320px; top: 0; width: 320px; height: 100%; background: #0a0a0a; border-left: 1px solid #333; transition: 0.4s ease; padding: 30px; z-index: 2000; box-shadow: -10px 0 30px rgba(0,0,0,0.5); }
        #email-panel.active { right: 0; }
        .panel-close { position: absolute; top: 20px; right: 20px; cursor: pointer; font-size: 24px; color: #666; }

        /* Chat Alanı */
        #chat-box { flex: 1; overflow-y: auto; padding: 40px 15%; display: flex; flex-direction: column; gap: 20px; }
        .msg { padding: 15px 20px; border-radius: 15px; max-width: 85%; line-height: 1.6; }
        .user { background: #1a1a1a; align-self: flex-end; border: 1px solid #333; }
        .ai { background: #fff; color: #000; align-self: flex-start; }

        .input-area { padding: 20px 15% 40px 15%; }
        .input-box { background: #111; display: flex; padding: 10px 20px; border-radius: 35px; border: 1px solid #333; }
        input#uInp, #newEmail { flex: 1; background: none; border: none; color: #fff; outline: none; }

        /* Login */
        #auth-screen { position: fixed; inset: 0; background: #000; z-index: 3000; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: #0a0a0a; padding: 40px; border-radius: 20px; width: 340px; text-align: center; border: 1px solid #222; }
        .auth-card input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; background: #000; border: 1px solid #333; color: #fff; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-card">
        <h2 style="margin-bottom: 20px;">MIRKAY-AI</h2>
        <input type="text" id="authEmail" placeholder="İsim (örn: mirkay)">
        <input type="password" id="authPass" placeholder="Şifre">
        <button onclick="handleAuth()" style="width:100%; padding:12px; background:#fff; border-radius:8px; font-weight:bold; cursor:pointer; border:none;">Giriş Yap / Kayıt Ol</button>
    </div>
</div>

<div id="sidebar">
    <div class="new-chat" onclick="startNewChat()">+ Yeni Sohbet</div>
    <div class="chat-list" id="chatList"></div>
</div>

<div id="main">
    <div class="header">
        <div style="font-weight: 900;">MIRKAY-AI</div>
        <div class="profile-container">
            <button class="profile-btn" id="p-icon" onclick="toggleMenu()">M</button>
            <div class="dropdown" id="dropMenu">
                <button class="drop-item" id="mailLinkBtn" onclick="openEmailPanel()">📧 E-posta Ekle</button>
                <button class="drop-item" style="color:#ff4d4d;" onclick="logout()">🚪 Çıkış Yap</button>
            </div>
        </div>
    </div>
    <div id="chat-box"></div>
    <div class="input-area">
        <div class="input-box">
            <input type="text" id="uInp" placeholder="Bir şeyler yaz..." onkeypress="if(event.key==='Enter') send()">
            <button onclick="send()" style="background:#fff; border:none; border-radius:50%; width:30px; height:30px; cursor:pointer;">↑</button>
        </div>
    </div>
</div>

<div id="email-panel">
    <span class="panel-close" onclick="openEmailPanel()">×</span>
    <h3 style="margin-top: 40px; margin-bottom: 20px;">E-posta Bağla</h3>
    <div id="emailActionArea">
        <input type="email" id="newEmail" placeholder="Gerçek Gmail adresin" style="width:100%; padding:12px; background:#000; border:1px solid #333; color:#fff; border-radius:10px; margin-bottom: 15px;">
        <button onclick="linkAndVerify()" style="width:100%; padding:12px; background:#fff; color:#000; border-radius:10px; border:none; font-weight:bold; cursor:pointer;">Kod Gönder & Bağla</button>
        <p style="font-size: 11px; color: #666; margin-top: 15px; text-align: center;">Kod gönderildikten sonra Spam kutunu kontrol etmeyi unutma.</p>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyABxjad9QLLdNFUd6LNTSAQQq7ImycGG1M",
        authDomain: "mirac-ai-auth.firebaseapp.com",
        projectId: "mirac-ai-auth",
        storageBucket: "mirac-ai-auth.firebasestorage.app",
        messagingSenderId: "531892620198",
        appId: "1:531892620198:web:dc2f8b1296115182f39d67"
    };
    firebase.initializeApp(firebaseConfig);
    const M_KEY = "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";

    function toggleMenu() { document.getElementById("dropMenu").classList.toggle("active"); }
    function openEmailPanel() { 
        document.getElementById("email-panel").classList.toggle("active");
        document.getElementById("dropMenu").classList.remove("active");
    }

    async function handleAuth() {
        let email = document.getElementById("authEmail").value;
        const pass = document.getElementById("authPass").value;
        if(!email.includes("@")) email += "@mirkay.com";

        try {
            await firebase.auth().createUserWithEmailAndPassword(email, pass)
                .catch(() => firebase.auth().signInWithEmailAndPassword(email, pass));
        } catch(e) { alert(e.message); }
    }

    firebase.auth().onAuthStateChanged((user) => {
        if(user) {
            document.getElementById("auth-screen").style.display = "none";
            document.getElementById("p-icon").innerText = user.email[0].toUpperCase();
            if(!user.email.includes("@mirkay.com")) {
                document.getElementById("mailLinkBtn").innerText = "❌ E-postadan Çık";
                document.getElementById("emailActionArea").innerHTML = `
                    <p style="font-size:13px; color:#aaa; margin-bottom:15px;">Bağlı: ${user.email}</p>
                    <button onclick="logout()" style="width:100%; padding:12px; background:#ff4d4d; color:#fff; border-radius:10px; border:none; cursor:pointer; font-weight:bold;">Hesaptan Tamamen Çık</button>
                `;
            }
            renderChatList();
        } else { document.getElementById("auth-screen").style.display = "flex"; }
    });

    async function linkAndVerify() {
        const mail = document.getElementById("newEmail").value;
        if(!mail) return alert("Lütfen mailini yaz.");
        const user = firebase.auth().currentUser;

        try {
            // Önce e-postayı güncelle
            await user.updateEmail(mail);
            // Sonra doğrulama maili (kod) gönder
            await user.sendEmailVerification();
            alert("Harika! Doğrulama bağlantısı e-postana gönderildi. Spam kutusuna bakmayı unutma!");
            location.reload();
        } catch(e) { 
            alert("Hata: " + e.message); 
        }
    }

    function logout() { firebase.auth().signOut(); location.reload(); }

    let currentChat = [];
    let allChats = JSON.parse(localStorage.getItem('mirkay_chats') || "[]");

    function startNewChat() {
        if(currentChat.length > 0) {
            allChats.push({ id: Date.now(), title: currentChat[0].text.slice(0,20), data: [...currentChat] });
            localStorage.setItem('mirkay_chats', JSON.stringify(allChats));
        }
        currentChat = [];
        document.getElementById("chat-box").innerHTML = "";
        renderChatList();
    }

    function renderChatList() {
        document.getElementById("chatList").innerHTML = allChats.map(c => `<div class="chat-item" onclick="loadChat(${c.id})">💬 ${c.title}...</div>`).reverse().join("");
    }

    function loadChat(id) {
        const chat = allChats.find(c => c.id === id);
        currentChat = [...chat.data];
        document.getElementById("chat-box").innerHTML = "";
        currentChat.forEach(m => addMsg(m.role, m.text));
    }

    async function send() {
        const i = document.getElementById("uInp");
        const t = i.value.trim();
        if(!t) return;
        addMsg("user", t);
        currentChat.push({role: "user", text: t});
        i.value = "";
        try {
            const r = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${M_KEY}`, "Content-Type": "application/json" },
                body: JSON.stringify({ model: "llama-3.1-8b-instant", messages: [{role: "system", content: "Sen Mirkay-AI'sın."}, ...currentChat] })
            });
            const d = await r.json();
            const reply = d.choices[0].message.content;
            addMsg("ai", reply);
            currentChat.push({role: "ai", text: reply});
        } catch(e) { addMsg("ai", "Hata!"); }
    }

    function addMsg(r, t) {
        const b = document.getElementById("chat-box");
        const d = document.createElement("div");
        d.className = `msg ${r}`;
        d.innerHTML = `<b>${r==='user'?'Sen':'Mirkay-AI'}:</b><br>${t}`;
        b.appendChild(d);
        b.scrollTop = b.scrollHeight;
    }
</script>
</body>
</html>
