<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mirac-AI | Dashboard</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background-color: #343541; color: white; display: flex; height: 100vh; overflow: hidden; }
        #setup-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #202123; display: flex; justify-content: center; align-items: center; z-index: 100; }
        .setup-box { background: #2b2c2f; padding: 30px; border-radius: 10px; text-align: center; width: 90%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { width: 100%; padding: 12px; margin: 15px 0; border-radius: 5px; border: 1px solid #4d4d4f; background: #40414f; color: white; outline: none; }
        .btn { background: #10a37f; color: white; border: none; padding: 12px; border-radius: 5px; cursor: pointer; width: 100%; font-weight: bold; }
        #chat-ui { display: none; flex: 1; flex-direction: column; }
        #messages { flex: 1; overflow-y: auto; padding: 20px 15%; }
        .row { padding: 15px; margin-bottom: 10px; border-radius: 8px; line-height: 1.5; word-break: break-word; }
        .user { background: #444654; align-self: flex-end; }
        .ai { background: transparent; border: 1px solid #4d4d4f; }
        .input-area { padding: 20px 15%; background: #343541; border-top: 1px solid #4d4d4f; }
        .input-box { background: #40414f; display: flex; padding: 10px; border-radius: 10px; }
        #userInput { flex: 1; background: transparent; border: none; color: white; padding: 10px; outline: none; }
    </style>
</head>
<body>

<div id="setup-screen">
    <div class="setup-box">
        <h2>mirac-AI Kurulum</h2>
        <input type="password" id="keyInput" placeholder="API Key'ini buraya yapıştır...">
        <button class="btn" onclick="startApp()">Sistemi Başlat</button>
        <p style="margin-top:10px; font-size:12px; color:#8e8ea0;">Anahtarın sadece bu tarayıcıda saklanır.</p>
    </div>
</div>

<div id="chat-ui">
    <div id="messages"></div>
    <div class="input-area">
        <div class="input-box">
            <input type="text" id="userInput" placeholder="Mesajını yaz..." onkeypress="if(event.key==='Enter') send()">
            <button onclick="send()" style="background:none; border:none; color:#10a37f; cursor:pointer; font-size:20px; padding:0 10px;">➤</button>
        </div>
    </div>
</div>

<script>
    let API_KEY = localStorage.getItem("mirac_ai_key");

    if(API_KEY) {
        document.getElementById("setup-screen").style.display = "none";
        document.getElementById("chat-ui").style.display = "flex";
    }

    function startApp() {
        const val = document.getElementById("keyInput").value.trim();
        if(val.startsWith("AIza")) {
            localStorage.setItem("mirac_ai_key", val);
            location.reload();
        } else {
            alert("Geçerli bir API anahtarı girin!");
        }
    }

    async function send() {
        const input = document.getElementById("userInput");
        const box = document.getElementById("messages");
        const text = input.value.trim();
        if(!text) return;

        box.innerHTML += `<div class="row user"><b>Sen:</b><br>${text}</div>`;
        input.value = "";
        box.scrollTop = box.scrollHeight;

        try {
            // Hata 400'ü önlemek için en temiz JSON yapısı
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{
                        parts: [{ text: text }]
                    }]
                })
            });

            const data = await response.json();
            
            if(data.error) {
                box.innerHTML += `<div class="row ai" style="color:#ff4d4d;">Hata: ${data.error.message}</div>`;
            } else {
                const aiMsg = data.candidates[0].content.parts[0].text;
                box.innerHTML += `<div class="row ai"><b>mirac-AI:</b><br>${aiMsg}</div>`;
            }
        } catch (e) {
            box.innerHTML += `<div class="row ai" style="color:#ff4d4d;">Bağlantı hatası!</div>`;
        }
        box.scrollTop = box.scrollHeight;
    }
</script>
</body>
</html>
