<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>mirac-AI | Güvenli Erişim</title>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #343541; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: #202123; padding: 30px; border-radius: 10px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 15px 0; border-radius: 5px; border: 1px solid #4d4d4f; background: #40414f; color: white; }
        button { background: #10a37f; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; width: 100%; }
        #chat-ui { display: none; width: 100%; height: 100vh; flex-direction: column; }
    </style>
</head>
<body>

<div id="setup" class="box">
    <h2>mirac-AI Kurulum</h2>
    <p>Google anahtarını buraya gir (Sadece bu tarayıcıda saklanır)</p>
    <input type="text" id="keyInput" placeholder="AIza... anahtarını yapıştır">
    <button onclick="saveKey()">Sistemi Başlat</button>
</div>

<div id="chat-ui">
    <div id="output" style="flex:1; overflow-y:auto; padding: 20px; background:#343541;"></div>
    <div style="padding: 20px; background:#40414f;">
        <input type="text" id="userInput" placeholder="Mesaj yaz..." onkeypress="if(event.key==='Enter') send()">
    </div>
</div>

<script>
    let API_KEY = localStorage.getItem("gemini_key");

    if(API_KEY) {
        document.getElementById("setup").style.display = "none";
        document.getElementById("chat-ui").style.display = "flex";
    }

    function saveKey() {
        const val = document.getElementById("keyInput").value.trim();
        if(val.startsWith("AIza")) {
            localStorage.setItem("gemini_key", val);
            location.reload();
        } else {
            alert("Geçersiz anahtar!");
        }
    }

    async function send() {
        const inp = document.getElementById("userInput");
        const out = document.getElementById("output");
        const msg = inp.value;
        if(!msg) return;

        out.innerHTML += `<div><b>Sen:</b> ${msg}</div>`;
        inp.value = "";

        try {
            const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ contents: [{role: "user", parts: [{text: msg}]}] })
            });
            const data = await resp.json();
            const aiMsg = data.candidates[0].content.parts[0].text;
            out.innerHTML += `<div style="color:#10a37f;"><b>AI:</b> ${aiMsg}</div>`;
        } catch (e) {
            out.innerHTML += `<div style="color:red;">Hata! Anahtarın iptal edilmiş olabilir.</div>`;
        }
    }
</script>
</body>
</html>
