<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mirac-AI | Final Test</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background-color: #1a1a1b; color: white; display: flex; flex-direction: column; height: 100vh; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .row { padding: 15px; border-radius: 8px; max-width: 80%; }
        .user { background: #2f3032; align-self: flex-end; }
        .ai { background: #3e3f41; align-self: flex-start; }
        .input-area { padding: 20px; background: #202123; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 5px; border: none; background: #40414f; color: white; outline: none; }
        button { padding: 10px 20px; background: #10a37f; border: none; color: white; border-radius: 5px; cursor: pointer; }
        #setup { position: fixed; top:0; left:0; width:100%; height:100%; background: #000; display: flex; justify-content: center; align-items: center; z-index: 10; }
    </style>
</head>
<body>

<div id="setup">
    <div style="text-align:center;">
        <h2>Son Test: API Anahtarı</h2>
        <input type="password" id="keyIn" placeholder="AIza... anahtarını yapıştır" style="width: 300px; margin: 20px 0; display: block;">
        <button onclick="start()">Sistemi Başlat</button>
    </div>
</div>

<div id="messages"></div>
<div class="input-area">
    <input type="text" id="userInput" placeholder="Mesaj yaz..." onkeypress="if(event.key==='Enter') send()">
    <button onclick="send()">Gönder</button>
</div>

<script>
    let API_KEY = "";

    function start() {
        const val = document.getElementById("keyIn").value.trim();
        if(val.startsWith("AIza")) {
            API_KEY = val;
            document.getElementById("setup").style.display = "none";
            addMsg("ai", "Sistem Gemini 1.0 Pro modunda başlatıldı. Deneme yapabilirsin.");
        } else {
            alert("Geçersiz anahtar!");
        }
    }

    function addMsg(type, text) {
        const box = document.getElementById("messages");
        box.innerHTML += `<div class="row ${type}"><b>${type === 'user' ? 'Sen' : 'mirac-AI'}:</b><br>${text}</div>`;
        box.scrollTop = box.scrollHeight;
    }

    async function send() {
        const input = document.getElementById("userInput");
        const text = input.value.trim();
        if(!text) return;

        addMsg("user", text);
        input.value = "";

        try {
            // EN TEMEL URL: gemini-pro (v1 sürümü)
            const response = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-pro:generateContent?key=${API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: text }] }]
                })
            });

            const data = await response.json();

            if(data.error) {
                addMsg("ai", "Hata Aldık: " + data.error.message);
            } else {
                addMsg("ai", data.candidates[0].content.parts[0].text);
            }
        } catch (e) {
            addMsg("ai", "Bağlantı kurulamadı!");
        }
    }
</script>
</body>
</html>
