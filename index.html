<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mirkay-AI | Premium v3.9</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --bg: #050505; --sidebar: #0d0d0d; --text: #ececec; --gold: #ffd700; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

        #sidebar { width: 260px; background: var(--sidebar); border-right: 1px solid #222; display: flex; flex-direction: column; }
        .premium-btn { margin: 15px; padding: 12px; background: linear-gradient(45deg, var(--gold), #ff8c00); color: #000; border-radius: 8px; text-align: center; font-weight: 900; cursor: pointer; font-size: 13px; animation: glow 2s infinite; }
        @keyframes glow { 0% { box-shadow: 0 0 5px var(--gold); } 50% { box-shadow: 0 0 15px #ff8c00; } 100% { box-shadow: 0 0 5px var(--gold); } }
        
        #main { flex: 1; display: flex; flex-direction: column; }
        .header { height: 60px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; }
        .status-badge { font-size: 10px; padding: 3px 8px; border-radius: 4px; background: #222; font-weight: bold; }
        .pro-badge { background: var(--gold) !important; color: #000 !important; }
        
        #chat-box { flex: 1; overflow-y: auto; padding: 20px 15%; display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 12px 18px; border-radius: 15px; max-width: 80%; line-height: 1.5; font-size: 14px; }
        .user { background: #1a1a1a; align-self: flex-end; border: 1px solid #333; }
        .ai { background: #fff; color: #000; align-self: flex-start; }
        .premium-text { color: var(--gold) !important; text-shadow: 0 0 8px rgba(255, 215, 0, 0.4); }

        .input-area { padding: 20px 15% 40px 15%; }
        .input-box { background: #111; display: flex; padding: 10px 20px; border-radius: 35px; border: 1px solid #333; }
        input#uInp { flex: 1; background: none; border: none; color: #fff; outline: none; }

        #auth-screen { position: fixed; inset: 0; background: #000; z-index: 3000; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: #0a0a0a; padding: 30px; border-radius: 20px; border: 1px solid #222; width: 320px; text-align: center; }
        .auth-card input { width: 100%; padding: 10px; margin: 8px 0; border-radius: 8px; background: #000; border: 1px solid #333; color: #fff; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-card">
        <h2>MIRKAY-AI</h2>
        <input type="email" id="authEmail" placeholder="Gmail Adresiniz">
        <input type="password" id="authPass" placeholder="Şifreniz">
        <button onclick="handleAuth()" style="width:100%; padding:10px; background:#fff; border:none; border-radius:8px; font-weight:bold; cursor:pointer; margin-top:10px;">Giriş / Kayıt</button>
    </div>
</div>

<div id="sidebar">
    <div class="premium-btn" onclick="alert('Premium için Mirkay ile iletişime geçin!')">💎 PREMIUM'A GEÇ</div>
    <div style="padding:15px; font-size:12px; color:#555;">SOHBETLER</div>
    <div id="chatList" style="padding:10px;"></div>
</div>

<div id="main">
    <div class="header">
        <div style="font-weight:900;">MIRKAY-AI <span id="userStatus" class="status-badge">FREE</span></div>
        <button onclick="firebase.auth().signOut(); location.reload();" style="background:none; color:#ff4d4d; border:none; cursor:pointer;">Çıkış Yap</button>
    </div>
    <div id="chat-box"></div>
    <div class="input-area">
        <div class="input-box">
            <input type="text" id="uInp" placeholder="Mesajınızı yazın..." onkeypress="if(event.key==='Enter') send()">
            <button onclick="send()" style="background:#fff; border:none; border-radius:50%; width:30px; height:30px; cursor:pointer; font-weight:bold;">↑</button>
        </div>
    </div>
</div>

<script>
    // Yeni Config Bilgilerin Yerleştirildi!
    const firebaseConfig = {
      apiKey: "AIzaSyC_dfVhnWnRBPiLC4YiMqWkjCoIL18b04U",
      authDomain: "mirkay-ai-7b690.firebaseapp.com",
      projectId: "mirkay-ai-7b690",
      storageBucket: "mirkay-ai-7b690.firebasestorage.app",
      messagingSenderId: "828125100684",
      appId: "1:828125100684:web:0e9079c9efcdf1cbe8d9a9"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const M_KEY = "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";

    let isPremium = false;
    let currentChat = [];

    async function handleAuth() {
        const e = document.getElementById("authEmail").value;
        const p = document.getElementById("authPass").value;
        if(!e || !p) return alert("Lütfen alanları doldurun.");
        try {
            await firebase.auth().createUserWithEmailAndPassword(e, p)
                .catch(() => firebase.auth().signInWithEmailAndPassword(e, p));
        } catch(err) { alert("Hata: " + err.message); }
    }

    firebase.auth().onAuthStateChanged(async (user) => {
        if(user) {
            document.getElementById("auth-screen").style.display = "none";
            
            const userRef = db.collection("users").doc(user.uid);
            const doc = await userRef.get();

            if (!doc.exists()) {
                await userRef.set({ email: user.email, isPremium: false });
            } else {
                isPremium = doc.data().isPremium;
                if(isPremium) {
                    const badge = document.getElementById("userStatus");
                    badge.innerText = "PRO";
                    badge.classList.add("pro-badge");
                }
            }
        } else {
            document.getElementById("auth-screen").style.display = "flex";
        }
    });

    async function send() {
        const inp = document.getElementById("uInp");
        const val = inp.value.trim();
        if(!val) return;

        addMsg("user", val);
        currentChat.push({ role: "user", content: val });
        inp.value = "";

        try {
            const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${M_KEY}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: isPremium ? "llama-3.3-70b-versatile" : "llama3-8b-8192",
                    messages: [{ role: "system", content: "Sen Mirkay-AI'sın." }, ...currentChat]
                })
            });
            const d = await res.json();
            const reply = d.choices[0].message.content;
            addMsg("assistant", reply);
            currentChat.push({ role: "assistant", content: reply });
        } catch(e) { 
            addMsg("assistant", "Bağlantı hatası! Lütfen API anahtarını kontrol edin."); 
        }
    }

    function addMsg(r, t) {
        const box = document.getElementById("chat-box");
        const d = document.createElement("div");
        d.className = `msg ${r === 'user' ? 'user' : 'ai'}`;
        
        const label = (r === 'user') ? 
            (isPremium ? "<b class='premium-text'>✨ Sen (PRO)</b>" : "<b>Sen</b>") : 
            "<b>Mirkay-AI</b>";

        d.innerHTML = `${label}:<br>${t}`;
        box.appendChild(d);
        box.scrollTop = box.scrollHeight;
    }
</script>
</body>
</html>
