<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mirac-AI | Dashboard</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #343541; color: white; display: flex; height: 100vh; overflow: hidden; }
        #setup-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #202123; display: flex; justify-content: center; align-items: center; z-index: 100; }
        .setup-box { background: #2b2c2f; padding: 30px; border-radius: 10px; text-align: center; width: 90%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input[type="password"] { width: 100%; padding: 12px; margin: 15px 0; border-radius: 5px; border: 1px solid #4d4d4f; background: #40414f; color: white; outline: none; }
        .btn-start { background: #10a37f; color: white; border: none; padding: 12px; border-radius: 5px; cursor: pointer; width: 100%; font-weight: bold; }
        #chat-ui { display: none; flex: 1; flex-direction: column; width: 100%; }
        #messages { flex: 1; overflow-y: auto; padding: 40px 15%; display: flex; flex-direction: column; gap: 20px; }
        .row { padding: 20px; border-radius: 10px; max-width: 85%; line-height: 1.6; }
        .user { background: #444654; align-self: flex-end; }
        .ai { background: #2b2c2f; align-self: flex-start; border: 1px solid #4d4d4f; }
        .input-area { padding: 20px 15%; background: #343541; }
        .input-box { background: #40414f; display: flex; padding: 10px; border-radius: 12px; }
        #userInput { flex: 1; background: transparent; border: none; color: white; padding: 10px; outline: none; }
        .send-btn { background: none; border: none; color: #10a37f; cursor: pointer; font-size: 24px; padding: 0 10px; }
    </style>
</head>
<body>

<div id="setup-screen">
    <div class="setup-box">
        <h2>mirac-AI Kurulum</h2>
        <p style="font-size: 13px; color: #acacbe; margin-top: 8px;">Yeni API Key'ini girerek sistemi aktifleştir.</p>
        <input type="password" id="keyInput" placeholder="AIza... anahtarını yapıştır">
        <button class="btn-start" onclick="saveKey()">Sistemi Başlat</button>
    </div>
</div>

<div id="chat-ui">
    <div id="messages">
        <div class="row ai">Selam Mirac! Sistem güncellendi ve hazır.</div>
    </div>
    <div class="input-area">
        <div class="input-box">
            <input type="text" id="userInput" placeholder="Mesajını yaz..." onkeypress="if(event.key==='Enter') send()">
            <button class="send-btn" onclick="send()">➤</button>
        </div>
    </div>
</div>

<script>
    let API_KEY = localStorage.getItem("mirac_key_final");

    if (API_KEY) {
        document.getElementById("setup-screen").style.display = "none";
        document.getElementById("chat-ui").style.display = "flex";
    }

    function saveKey() {
        const val = document.getElementById("keyInput").value.trim();
        if (val.startsWith("AIza")) {
            localStorage.setItem("mirac_key_final", val);
            location.reload();
        } else {
            alert("Geçersiz anahtar!");
        }
    }

    async function send() {
        const input = document.getElementById("userInput");
        const box = document.getElementById("messages");
        const text = input.value.trim();
        if (!text) return;

        box.innerHTML += `<div class="row user"><b>Sen:</b><br>${text}</div>`;
        input.value = "";
        box.scrollTop = box.scrollHeight;

        try {
            // URL ve Model İsmi En Kararlı Hale Getirildi
            const response = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: text }] }]
                })
            });

            const data = await response.json();

            if (data.error) {
                box.innerHTML += `<div class="row ai" style="color:#ff6b6b;"><b>Hata:</b> ${data.error.message}</div>`;
            } else {
                const aiText = data.candidates[0].content.parts[0].text;
                box.innerHTML += `<div class="row ai"><b>mirac-AI:</b><br>${aiText}</div>`;
            }
        } catch (err) {
            box.innerHTML += `<div class="row ai" style="color:#ff6b6b;">Bağlantı sorunu!</div>`;
        }
        box.scrollTop = box.scrollHeight;
    }
</script>
</body>
</html>
