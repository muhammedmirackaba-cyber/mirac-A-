<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mirac-AI Chat</title>
    <style>
        /* WhatsApp/ChatGPT Tarzı Temiz Tasarım */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #e5ddd5; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #header { background: #075e54; padding: 15px; text-align: center; font-weight: bold; font-size: 18px; color: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
        .msg { padding: 10px 15px; border-radius: 10px; max-width: 80%; word-wrap: break-word; font-size: 15px; position: relative; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .user { background-color: #dcf8c6; color: #303030; align-self: flex-end; border-top-right-radius: 0; }
        .ai { background-color: white; color: #303030; align-self: flex-start; border-top-left-radius: 0; }
        #input-area { background: #f0f0f0; padding: 10px; display: flex; gap: 10px; align-items: center; }
        input { flex: 1; padding: 12px; border: none; border-radius: 25px; outline: none; font-size: 16px; }
        button { background: #075e54; color: white; border: none; padding: 10px 20px; border-radius: 25px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #128c7e; }
    </style>
</head>
<body>

<div id="header">mirac-AI Sohbet</div>
<div id="chat-box" id="chatBox">
    <div class="msg ai">Selam Mirac! Yeni sohbet ekranına hoş geldin. Bugün neler yapıyoruz?</div>
</div>

<div id="input-area">
    <input type="text" id="userInput" placeholder="Mesaj yazın..." onkeypress="if(event.key === 'Enter') send()">
    <button onclick="send()">Gönder</button>
</div>

<script>
    let history = [];
    // API Key'in buraya eklendi!
    const MY_API_KEY = "AIzaSyBVmKuSE-HgG_4inNNR61kRb8yZaQGJZok"; 

    async function send() {
        const input = document.getElementById("userInput");
        const text = input.value.trim();
        if(!text) return;

        addMsg(text, 'user');
        history.push({ role: "user", parts: [{ text: text }] });
        input.value = "";

        try {
            const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${MY_API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ 
                    contents: history,
                    systemInstruction: { parts: [{ text: "Sen mirac-AI adında zeki bir asistansın. Kullanıcının önceki sorularını asla unutma. Kısa, samimi ve net cevaplar ver. Eğer eksik soru gelirse önceki konudan devam et." }] }
                })
            });

            const data = await resp.json();
            const aiText = data.candidates[0].content.parts[0].text;
            
            addMsg(aiText, 'ai');
            history.push({ role: "model", parts: [{ text: aiText }] });
        } catch (e) {
            addMsg("Bir hata oluştu. Lütfen API anahtarını veya internetini kontrol et.", 'ai');
            console.error(e);
        }
    }

    function addMsg(text, type) {
        const box = document.getElementById("chat-box");
        const div = document.createElement("div");
        div.className = `msg ${type}`;
        div.innerText = text;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }
</script>

</body>
</html>
