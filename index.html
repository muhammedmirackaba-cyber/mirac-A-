<script>
    // Firebase Config aynı kalıyor
    const firebaseConfig = {
      apiKey: "AIzaSyC_dfVhnWnRBPiLC4YiMqWkjCoIL18b04U",
      authDomain: "mirkay-ai-7b690.firebaseapp.com",
      projectId: "mirkay-ai-7b690",
      storageBucket: "mirkay-ai-7b690.firebasestorage.app",
      messagingSenderId: "828125100684",
      appId: "1:828125100684:web:0e9079c9efcdf1cbe8d9a9"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // DİKKAT: Buraya Groq Cloud'dan aldığın YEPYENİ bir API Key yapıştır!
    const M_KEY = "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"; 

    let isPremium = false;
    let currentChat = [];

    // ... (Auth ve Firestore fonksiyonları aynı)

    async function send() {
        const inp = document.getElementById("uInp");
        if(!inp.value.trim()) return;
        
        const val = inp.value;
        addMsg("user", val);
        currentChat.push({ role: "user", content: val });
        inp.value = "";

        try {
            const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { 
                    "Authorization": `Bearer ${M_KEY}`, 
                    "Content-Type": "application/json" 
                },
                body: JSON.stringify({
                    // Ücretsiz model ismini en güncel 'llama-3.3-70b-specdec' ile değiştirdim
                    model: isPremium ? "llama-3.3-70b-versatile" : "llama-3.3-70b-specdec",
                    messages: [{ role: "system", content: "Sen Mirkay-AI'sın." }, ...currentChat]
                })
            });

            const d = await res.json();

            if (d.error) {
                addMsg("assistant", "Sistem Hatası: " + d.error.message);
            } else {
                const reply = d.choices[0].message.content;
                addMsg("assistant", reply);
                currentChat.push({ role: "assistant", content: reply });
            }
        } catch(e) { 
            addMsg("assistant", "Bağlantı koptu, anahtarı kontrol et!"); 
        }
    }

    // ... (addMsg fonksiyonu aynı)
</script>
