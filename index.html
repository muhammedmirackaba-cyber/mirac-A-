<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mirkay-AI Official</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#10a37f">

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --bg: #212121; --sidebar: #171717; --text: #ececec; --gpt-green: #10a37f; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

        /* HAMBURGER MENÜ BUTONU (Masaüstünde Gizli, Mobilde Görünür) */
        #menuToggle {
            display: none;
            position: fixed;
            top: 10px;
            left: 10px;
            z-index: 2000;
            background: #2f2f2f;
            color: white;
            border: 1px solid #444;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
        }

        /* SIDEBAR AYARLARI */
        #sidebar { 
            width: 260px; 
            background: var(--sidebar); 
            display: flex; 
            flex-direction: column; 
            padding: 10px; 
            transition: 0.3s ease;
            z-index: 1500;
            border-right: 1px solid #333;
        }

        /* MOBİL TASARIM DOKUNUŞLARI */
        @media (max-width: 768px) {
            #menuToggle { display: block; } /* Mobilde 3 çizgiyi göster */
            #sidebar {
                position: fixed;
                left: -260px; /* Başlangıçta ekran dışında */
                height: 100%;
            }
            #sidebar.open { left: 0; } /* Menü açılınca içeri kay */
            #chat-box { padding: 60px 15px 120px 15px !important; }
            .input-area { padding: 10px 10px 25px 10px !important; }
        }

        #installBtn { background: var(--gpt-green); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; margin-bottom: 10px; font-weight: bold; width: 100%; }
        .new-chat { border: 1px solid #4d4d4d; padding: 12px; border-radius: 8px; cursor: pointer; margin-bottom: 15px; font-size: 14px; text-align: center; }
        #chatList { flex: 1; overflow-y: auto; }
        .history-item { padding: 10px; border-radius: 6px; cursor: pointer; font-size: 13px; margin-bottom: 5px; background: rgba(255,255,255,0.03); }

        /* ANA SOHBET ALANI */
        #main { flex: 1; display: flex; flex-direction: column; position: relative; width: 100%; }
        #chat-box { flex: 1; overflow-y: auto; padding: 30px 20% 150px 20%; display: flex; flex-direction: column; gap: 20px; }
        .msg { display: flex; gap: 15px; padding: 15px; border-radius: 10px; line-height: 1.6; }
        .ai-msg { background: rgba(255,255,255,0.02); }
        
        .input-area { position: absolute; bottom: 0; left: 0; right: 0; padding: 20px 20% 40px 20%; background: linear-gradient(transparent, var(--bg) 50%); }
        .input-box { background: #2f2f2f; display: flex; align-items: center; padding: 12px 18px; border-radius: 12px; border: 1px solid #4d4d4d; }
        input#uInp { flex: 1; background: none; border: none; color: white; outline: none; font-size: 16px; }

        /* KARARTMA KATMANI */
        #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 1400; }
        
        #auth-screen { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: #171717; padding: 30px; border-radius: 20px; width: 320px; text-align: center; }
    </style>
</head>
<body>

<div id="overlay" onclick="toggleSidebar()"></div>
<button id="menuToggle" onclick="toggleSidebar()"><i class="fa fa-bars"></i></button>

<div id="auth-screen">
    <div class="auth-card">
        <h2 style="color:var(--gpt-green); margin-bottom:20px;">Mirkay-AI</h2>
        <input type="email" id="authEmail" style="width:100%; padding:12px; margin-bottom:10px; background:#212121; border:1px solid #333; color:white; border-radius:8px;" placeholder="E-posta">
        <input type="password" id="authPass" style="width:100%; padding:12px; margin-bottom:20px; background:#212121; border:1px solid #333; color:white; border-radius:8px;" placeholder="Şifre">
        <button onclick="handleAuth()" style="width:100%; padding:12px; background:var(--gpt-green); color:white; border:none; border-radius:8px; cursor:pointer; font-weight:bold;">Devam Et</button>
    </div>
</div>

<div id="sidebar">
    <button id="installBtn" onclick="triggerInstall()" style="display:none;">Uygulamayı Yükle</button>
    <div class="new-chat" onclick="resetChat(); if(window.innerWidth < 768) toggleSidebar();"><i class="fa fa-plus"></i> Yeni Sohbet</div>
    <div id="chatList"></div>
    <div style="padding:10px; border-top:1px solid #333; margin-top:auto;">
        <span id="uEmail" style="font-size:11px; opacity:0.5;"></span>
        <div onclick="firebase.auth().signOut().then(()=>location.reload())" style="color:#ff4d4d; cursor:pointer; font-size:12px; margin-top:5px;">Çıkış Yap</div>
    </div>
</div>

<div id="main">
    <div id="chat-box"></div>
    <div class="input-area">
        <div class="input-box">
            <input type="file" id="fileInp" hidden accept="image/*" onchange="previewImg(this)">
            <i id="clipIcon" class="fa fa-paperclip" onclick="checkPremiumAndOpen()" style="cursor:pointer; color:#888; display:none; margin-right:10px;"></i>
            <img id="imgPrev" style="height:40px; display:none; border-radius:5px; margin-right:10px;">
            <input type="text" id="uInp" placeholder="Mesaj yazın..." onkeypress="if(event.key==='Enter') send()">
            <i class="fa fa-arrow-up" onclick="send()" style="cursor:pointer; background:white; color:black; padding:8px; border-radius:8px; margin-left:10px;"></i>
        </div>
    </div>
</div>

<script>
    function toggleSidebar() {
        const sb = document.getElementById('sidebar');
        const ov = document.getElementById('overlay');
        sb.classList.toggle('open');
        ov.style.display = sb.classList.contains('open') ? 'block' : 'none';
    }

    const firebaseConfig = {
      apiKey: "AIzaSyC_dfVhnWnRBPiLC4YiMqWkjCoIL18b04U",
      authDomain: "mirkay-ai-7b690.firebaseapp.com",
      projectId: "mirkay-ai-7b690",
      storageBucket: "mirkay-ai-7b690.firebasestorage.app",
      messagingSenderId: "828125100684",
      appId: "1:828125100684:web:0e9079c9efcdf1cbe8d9a9"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const M_KEY = "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";

    let isPremium = false, currentChat = [], currentChatId = null, selectedImgBase64 = null, currentUser = null;

    firebase.auth().onAuthStateChanged(async (user) => {
        if(user) {
            currentUser = user;
            document.getElementById("auth-screen").style.display = "none";
            document.getElementById("uEmail").innerText = user.email;
            const doc = await db.collection("users").doc(user.uid).get();
            if (doc.exists) {
                isPremium = doc.data().isPremium || false;
                if(isPremium) document.getElementById("clipIcon").style.display = "block";
            }
            loadHistory();
        }
    });

    // PWA Kurulum Butonu Mantığı
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault(); deferredPrompt = e;
        document.getElementById('installBtn').style.display = 'block';
    });

    async function triggerInstall() {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') document.getElementById('installBtn').style.display = 'none';
            deferredPrompt = null;
        }
    }

    async function send() {
        const inp = document.getElementById("uInp");
        if(!inp.value.trim() && !selectedImgBase64) return;
        const text = inp.value;
        const img = selectedImgBase64;
        
        if(!currentChatId) {
            currentChatId = Date.now().toString();
            document.getElementById("chat-box").innerHTML = "";
            await db.collection("users").doc(currentUser.uid).collection("chats").doc(currentChatId).set({
                title: text ? text.substring(0,15) : "Yeni Sohbet", messages: [], date: Date.now()
            });
            loadHistory();
        }
        
        addMsg("user", text, img);
        inp.value = ""; selectedImgBase64 = null;
        document.getElementById("imgPrev").style.display = "none";

        let userContent = [{ type: "text", text: text }];
        if(img) userContent.push({ type: "image_url", image_url: { url: img } });
        currentChat.push({ role: "user", content: userContent });

        try {
            const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${M_KEY}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: img ? "llama-3.2-11b-vision-preview" : (isPremium ? "llama-3.3-70b-versatile" : "llama-3.1-8b-instant"),
                    messages: [{ role: "system", content: "Sen Mirkay-AI'sın." }, ...currentChat]
                })
            });
            const d = await res.json();
            const reply = d.choices[0].message.content;
            addMsg("assistant", reply);
            currentChat.push({ role: "assistant", content: reply });
            await db.collection("users").doc(currentUser.uid).collection("chats").doc(currentChatId).update({ messages: currentChat });
        } catch(e) { addMsg("assistant", "Bir hata oluştu."); }
    }

    function addMsg(r, t, img) {
        const box = document.getElementById("chat-box");
        const div = document.createElement("div");
        div.className = r === 'assistant' ? "msg ai-msg" : "msg";
        let imgTag = img ? `<img src="${img}" style="max-width:100%; border-radius:10px; margin-top:10px;"><br>` : "";
        div.innerHTML = `<div class="msg-content"><b>${r === 'user' ? 'Siz' : 'Mirkay-AI'}</b><br>${imgTag}${t}</div>`;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }

    async function loadHistory() {
        const list = document.getElementById("chatList");
        list.innerHTML = "";
        const snap = await db.collection("users").doc(currentUser.uid).collection("chats").orderBy("date", "desc").limit(5).get();
        snap.forEach(doc => {
            const item = document.createElement("div");
            item.className = "history-item";
            item.innerHTML = `<i class="fa fa-message"></i> ${doc.data().title}`;
            item.onclick = () => {
                currentChatId = doc.id;
                currentChat = doc.data().messages;
                document.getElementById("chat-box").innerHTML = "";
                currentChat.forEach(m => {
                    let text = typeof m.content === 'string' ? m.content : m.content[0].text;
                    let img = Array.isArray(m.content) && m.content[1] ? m.content[1].image_url.url : null;
                    addMsg(m.role, text, img);
                });
                if(window.innerWidth < 768) toggleSidebar();
            };
            list.appendChild(item);
        });
    }

    function resetChat() { currentChatId = null; currentChat = []; document.getElementById("chat-box").innerHTML = ""; }
    async function handleAuth() {
        const e = document.getElementById("authEmail").value, p = document.getElementById("authPass").value;
        await firebase.auth().signInWithEmailAndPassword(e, p).catch(() => firebase.auth().createUserWithEmailAndPassword(e, p));
    }
    function previewImg(i) {
        const r = new FileReader();
        r.onload = (e) => { selectedImgBase64 = e.target.result; const p = document.getElementById("imgPrev"); p.src = e.target.result; p.style.display = "block"; };
        r.readAsDataURL(i.files[0]);
    }
    function checkPremiumAndOpen() { if(isPremium) document.getElementById('fileInp').click(); else alert("PRO üyelik gerekli."); }
    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
</script>
</body>
</html>
