<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>mirac-AI | Güvenli Erişim</title>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #343541; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .setup-container { background: #202123; padding: 30px; border-radius: 10px; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        input { width: 100%; padding: 12px; margin: 15px 0; border-radius: 5px; border: 1px solid #4d4d4f; background: #40414f; color: white; }
        button { background: #10a37f; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        #chat-ui { display: none; width: 100%; height: 100vh; flex-direction: column; }
    </style>
</head>
<body>

<div id="setup" class="setup-container">
    <h2>mirac-AI Kurulum</h2>
    <p>Google anahtarın GitHub'da görünmemeli.</p>
    <input type="text" id="keyInput" placeholder="Yeni API Key'ini buraya yapıştır...">
    <button onclick="saveKey()">Sistemi Başlat</button>
</div>

<div id="chat-ui">
    <div style="flex:1; overflow-y:auto; padding: 20px;" id="chat-box"></div>
    <div style="padding: 20px;"><input type="text" id="msgInput" onkeypress="if(event.key==='Enter') send()"></div>
</div>

<script>
    let MY_API_KEY = localStorage.getItem("mirac_ai_key");

    if(MY_API_KEY) {
        document.getElementById("setup").style.display = "none";
        document.getElementById("chat-ui").style.display = "flex";
    }

    function saveKey() {
        const val = document.getElementById("keyInput").value;
        if(val.startsWith("AIza")) {
            localStorage.setItem("mirac_ai_key", val);
            location.reload();
        } else {
            alert("Geçersiz API anahtarı!");
        }
    }

    async function send() {
        const input = document.getElementById("msgInput");
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${MY_API_KEY}`;
        
        // Fetch ve Mesaj Ekleme Mantığı (Aynı)
        const resp = await fetch(url, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ contents: [{role: "user", parts: [{text: input.value}]}] })
        });
        const data = await resp.json();
        alert("Cevap: " + data.candidates[0].content.parts[0].text);
    }
</script>
</body>
</html>
