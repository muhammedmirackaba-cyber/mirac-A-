<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mirac-AI | Pro Dashboard</title>
    <style>
        :root { --bg: #1a1a1b; --sidebar: #121212; --accent: #10a37f; --text: #ececec; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

        /* Giriş (Login) Ekranı */
        #login-screen { position: fixed; inset: 0; background: #000; display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .login-box { background: #262729; padding: 40px; border-radius: 15px; text-align: center; width: 90%; max-width: 400px; border: 1px solid #3e3f41; }
        
        /* Yan Panel (Sidebar) */
        #sidebar { width: 260px; background: var(--sidebar); display: flex; flex-direction: column; transition: 0.3s; position: relative; border-right: 1px solid #333; }
        #sidebar.closed { width: 0; overflow: hidden; border: none; }
        .sidebar-content { padding: 15px; flex: 1; }
        .history-item { padding: 10px; margin-bottom: 5px; background: #222; border-radius: 5px; cursor: pointer; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .history-item:hover { background: #333; }

        /* Aç/Kapat Çizgisi (Toggle) */
        .toggle-btn { position: absolute; left: 10px; top: 15px; cursor: pointer; z-index: 100; font-size: 20px; background: none; border: none; color: white; display: flex; flex-direction: column; gap: 4px; }
        .toggle-btn span { width: 20px; height: 2px; background: white; display: block; }

        /* Ana Chat Alanı */
        #main { flex: 1; display: flex; flex-direction: column; position: relative; }
        #chat-container { flex: 1; overflow-y: auto; padding: 50px 15% 100px 15%; display: flex; flex-direction: column; gap: 20px; }
        .row { padding: 20px; border-radius: 10px; line-height: 1.6; max-width: 90%; }
        .user { background: #2f3032; align-self: flex-end; }
        .ai { background: #212121; align-self: flex-start; border: 1px solid #333; }

        /* Giriş Alanı */
        .input-wrapper { position: absolute; bottom: 0; width: 100%; padding: 20px 15%; background: linear-gradient(transparent, var(--bg) 50%); }
        .input-box { background: #343541; display: flex; padding: 10px; border-radius: 10px; border: 1px solid #555; }
        input { flex: 1; background: transparent; border: none; color: white; padding: 10px; outline: none; }
        button.send { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        
        input.key-input { width: 100%; padding: 12px; margin: 20px 0; border-radius: 5px; border: 1px solid #444; background: #1a1a1b; color: white; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <h2>mirac-AI Dashboard</h2>
        <input type="password" id="api-key" class="key-input" placeholder="Groq Anahtarını Gir (gsk_...)">
        <button class="send" style="width:100%" onclick="login()">Sisteme Giriş Yap</button>
    </div>
</div>

<button class="toggle-btn" onclick="toggleSidebar()">
    <span></span><span></span><span></span>
</button>

<div id="sidebar">
    <div class="sidebar-content">
        <h3 style="margin-bottom: 20px; font-size: 16px;">Sohbet Geçmişi</h3>
        <div id="history-list"></div>
        <button onclick="clearHistory()" style="margin-top:20px; background:none; color:#888; border:none; cursor:pointer; font-size:12px;">Geçmişi Temizle</button>
    </div>
</div>

<div id="main">
    <div id="chat-container"></div>
    <div class="input-wrapper">
        <div class="input-box">
            <input type="text" id="userInput" placeholder="Mesajını yaz..." onkeypress="if(event.key==='Enter') send()">
            <button class="send" onclick="send()">Gönder</button>
        </div>
    </div>
</div>

<script>
    let API_KEY = localStorage.getItem("mirac_groq_final");
    let history = JSON.parse(localStorage.getItem("chat_history") || "[]");

    if (API_KEY) {
        document.getElementById("login-screen").style.display = "none";
        renderHistory();
    }

    function login() {
        const key = document.getElementById("api-key").value.trim();
        if (key.startsWith("gsk_")) {
            localStorage.setItem("mirac_groq_final", key);
            location.reload();
        } else { alert("Geçersiz anahtar!"); }
    }

    function toggleSidebar() {
        document.getElementById("sidebar").classList.toggle("closed");
    }

    function addMsg(role, text) {
        const container = document.getElementById("chat-container");
        const div = document.createElement("div");
        div.className = `row ${role}`;
        div.innerHTML = `<b>${role === 'user' ? 'Sen' : 'mirac-AI'}:</b><br>${text}`;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    async function send() {
        const input = document.getElementById("userInput");
        const text = input.value.trim();
        if (!text) return;

        addMsg("user", text);
        input.value = "";

        try {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${API_KEY}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    model: "llama3-8b-8192",
                    messages: [{ role: "user", content: text }]
                })
            });

            const data = await response.json();
            const reply = data.choices[0].message.content;
            addMsg("ai", reply);

            // Geçmişe Kaydet
            history.unshift({ q: text, a: reply.substring(0, 30) + "..." });
            if (history.length > 10) history.pop();
            localStorage.setItem("chat_history", JSON.stringify(history));
            renderHistory();

        } catch (e) {
            addMsg("ai", "Hata: Bağlantı kurulamadı.");
        }
    }

    function renderHistory() {
        const list = document.getElementById("history-list");
        list.innerHTML = history.map(item => `<div class="history-item">${item.q}</div>`).join("");
    }

    function clearHistory() {
        localStorage.removeItem("chat_history");
        history = [];
        renderHistory();
    }
</script>
</body>
</html>
