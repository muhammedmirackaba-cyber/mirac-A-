<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mirkay-AI | Pro Access</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <style>
        :root { --bg: #000; --accent: #fff; --gray: #222; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; }
        
        /* Giriş ve Kayıt Kartı */
        .auth-card { background: #111; padding: 40px; border-radius: 20px; border: 1px solid #333; width: 350px; text-align: center; box-shadow: 0 0 20px rgba(255,255,255,0.05); }
        .logo-text { font-size: 24px; font-weight: bold; letter-spacing: 3px; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #444; color: #fff; border-radius: 8px; outline: none; }
        button { width: 100%; padding: 12px; background: #fff; color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        button:hover { opacity: 0.8; }
        
        /* Chat Uygulaması */
        #chat-app { display: none; width: 100%; height: 100vh; flex-direction: column; background: #000; }
        .header { padding: 20px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; background: #0a0a0a; }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px 15%; display: flex; flex-direction: column; gap: 20px; }
        .msg { padding: 15px; border-radius: 12px; max-width: 80%; line-height: 1.5; }
        .user { background: #222; align-self: flex-end; border: 1px solid #333; }
        .ai { background: #fff; color: #000; align-self: flex-start; }
        
        .input-area { padding: 30px 15%; background: linear-gradient(transparent, #000); }
        .input-box { background: #111; display: flex; padding: 5px; border-radius: 30px; border: 1px solid #333; }
    </style>
</head>
<body>

<div id="auth-screen" class="auth-card">
    <div class="logo-text">MIRKAY-AI</div>
    <p id="status" style="color: #888; font-size: 12px; margin-bottom: 10px;">E-posta ile Pro Erişimi</p>
    <input type="email" id="email" placeholder="E-posta Adresiniz">
    <input type="password" id="password" placeholder="Şifreniz">
    <button onclick="handleAuth(false)">Hesap Oluştur (Kayıt)</button>
    <button style="background: none; color: #fff; border: 1px solid #444;" onclick="handleAuth(true)">Giriş Yap</button>
</div>

<div id="chat-app">
    <div class="header">
        <div style="font-weight: bold; letter-spacing: 2px;">MIRKAY-AI <span style="color: gold; font-size: 10px;">PRO</span></div>
        <button onclick="logout()" style="width: auto; padding: 5px 15px; font-size: 12px;">Çıkış Yap</button>
    </div>
    <div id="chat-box"></div>
    <div class="input-area">
        <div class="input-box">
            <input type="text" id="userInput" placeholder="Mirkay'a sor..." onkeypress="if(event.key==='Enter') sendMsg()">
            <button onclick="sendMsg()" style="width: 40px; height: 40px; border-radius: 50%; margin: 2px;">↑</button>
        </div>
    </div>
</div>

<script>
    // 1. SENİN FİREBASE BİLGİLERİN
    const firebaseConfig = {
        apiKey: "AIzaSyABxjad9QLLdNFUd6LNTSAQQq7ImycGG1M",
        authDomain: "mirac-ai-auth.firebaseapp.com",
        projectId: "mirac-ai-auth",
        storageBucket: "mirac-ai-auth.firebasestorage.app",
        messagingSenderId: "531892620198",
        appId: "1:531892620198:web:dc2f8b1296115182f39d67",
        measurementId: "G-VNK61K7LLZ"
    };
    firebase.initializeApp(firebaseConfig);

    // 2. GROQ ANAHTARINI BURAYA YAZ
    const M_KEY = "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";

    // Giriş ve Kayıt Fonksiyonu
    async function handleAuth(isLogin) {
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;
        if(!email || !password) return alert("Lütfen bilgileri doldur!");

        try {
            if (isLogin) {
                const userCred = await firebase.auth().signInWithEmailAndPassword(email, password);
                if (!userCred.user.emailVerified) {
                    alert("Lütfen e-postana gelen linke tıkla ve onayla!");
                    await firebase.auth().signOut();
                }
            } else {
                const userCred = await firebase.auth().createUserWithEmailAndPassword(email, password);
                await userCred.user.sendEmailVerification();
                alert("Doğrulama maili gönderildi! Lütfen onaylayıp sonra Giriş Yap'a bas.");
            }
        } catch (e) { alert("Hata: " + e.message); }
    }

    // Kullanıcı giriş yapmış mı kontrol et
    firebase.auth().onAuthStateChanged((user) => {
        if (user && user.emailVerified) {
            document.getElementById("auth-screen").style.display = "none";
            document.getElementById("chat-app").style.display = "flex";
        } else {
            document.getElementById("auth-screen").style.display = "block";
            document.getElementById("chat-app").style.display = "none";
        }
    });

    function logout() { firebase.auth().signOut(); }

    function addMsg(role, text) {
        const box = document.getElementById("chat-box");
        const div = document.createElement("div");
        div.className = `msg ${role}`;
        div.innerHTML = `<b>${role === 'user' ? 'Sen' : 'Mirkay-AI'}:</b><br>${text}`;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }

    async function sendMsg() {
        const input = document.getElementById("userInput");
        const text = input.value.trim();
        if(!text) return;

        addMsg("user", text);
        input.value = "";

        try {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${M_KEY}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: "llama-3.1-8b-instant", // YENİ MODEL
                    messages: [
                        { role: "system", content: "Sen Mirkay-AI'sın. Beşiktaş'ın 16 şampiyonluğu olduğunu biliyorsun. Profesyonel ve zekice cevaplar ver." },
                        { role: "user", content: text }
                    ]
                })
            });
            const data = await response.json();
            addMsg("ai", data.choices[0].message.content);
        } catch (e) { addMsg("ai", "Hata oluştu, anahtarını kontrol et!"); }
    }
</script>
</body>
</html>
