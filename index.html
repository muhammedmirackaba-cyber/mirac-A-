<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mirac-AI | Global</title>
    <style>
        /* Tasarım: Modern ve Karanlık Tema */
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .message { padding: 12px 18px; border-radius: 15px; max-width: 80%; line-height: 1.4; }
        .user-msg { background: #3b82f6; align-self: flex-end; border-bottom-right-radius: 2px; }
        .ai-msg { background: #1e293b; align-self: flex-start; border-bottom-left-radius: 2px; border: 1px solid #334155; }
        #input-area { background: #1e293b; padding: 20px; display: flex; gap: 10px; border-top: 1px solid #334155; }
        input { flex: 1; padding: 12px; border-radius: 8px; border: none; background: #334155; color: white; outline: none; }
        button { padding: 10px 20px; background: #3b82f6; border: none; border-radius: 8px; color: white; cursor: pointer; font-weight: bold; }
        button:hover { background: #2563eb; }
    </style>
</head>
<body>

    <div id="chat-container">
        <div class="message ai-msg">Merhaba Mirac! Ben senin akıllı asistanın mirac-AI. Sana nasıl yardımcı olabilirim?</div>
    </div>

    <div id="input-area">
        <input type="text" id="userInput" placeholder="Mesajınızı yazın..." onkeypress="if(event.key === 'Enter') sendMessage()">
        <button onclick="sendMessage()">Gönder</button>
    </div>

    <script>
        // --- HAFIZA VE SİSTEM AYARLARI ---
        let chatHistory = []; // Konuşma geçmişini burada tutuyoruz (Hafıza)
        const API_KEY = "AIzaSyBVmKuSE-HgG_4inNNR61kRb8yZaQGJZok"; // Gemini API Key'ini buraya koy

        async function sendMessage() {
            const inputField = document.getElementById("userInput");
            const message = inputField.value.trim();
            if (!message) return;

            // 1. Kullanıcı mesajını ekrana yaz ve hafızaya al
            appendMessage(message, 'user-msg');
            chatHistory.push({ role: "user", parts: [{ text: message }] });
            inputField.value = "";

            try {
                // 2. Yapay Zekaya Gönder (Sistem Talimatı Dahil)
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: chatHistory,
                        systemInstruction: {
                            parts: [{ text: "Sen mirac-AI'sin. Kullanıcının önceki sorularını asla unutma. Eğer '2025 kaç?' gibi kısa sorular gelirse, bunu önceki konuyla (örneğin nüfus) birleştir. Asla alakasız takvim bilgisi verme." }]
                        }
                    })
                });

                const data = await response.json();
                const aiResponse = data.candidates[0].content.parts[0].text;

                // 3. Bot cevabını ekrana yaz ve hafızaya al
                appendMessage(aiResponse, 'ai-msg');
                chatHistory.push({ role: "model", parts: [{ text: aiResponse }] });

            } catch (error) {
                appendMessage("Hata: API anahtarını kontrol et veya internetini kontrol et.", 'ai-msg');
            }
        }

        function appendMessage(text, className) {
            const container = document.getElementById("chat-container");
            const div = document.createElement("div");
            div.className = `message ${className}`;
            div.innerText = text;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }
    </script>
</body>
</html>
