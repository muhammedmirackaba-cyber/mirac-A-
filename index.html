<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mirkay-AI | Pro</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <style>
        :root { --bg: #000; --accent: #fff; --card: #111; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #fff; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        .auth-card { background: var(--card); padding: 40px; border-radius: 20px; border: 1px solid #222; width: 340px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #333; color: #fff; border-radius: 10px; outline: none; }
        button.primary { width: 100%; padding: 12px; background: #fff; color: #000; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }

        #chat-app { display: none; width: 100%; height: 100vh; flex-direction: column; }
        .header { padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; }
        
        /* Profil Menüsü */
        .profile-container { position: relative; }
        .p-btn { width: 35px; height: 35px; border-radius: 50%; background: #fff; color: #000; border: none; font-weight: bold; cursor: pointer; }
        .dropdown { position: absolute; top: 45px; right: 0; background: #1a1a1a; border: 1px solid #333; border-radius: 10px; width: 160px; display: none; flex-direction: column; z-index: 100; }
        .dropdown.active { display: flex; }
        .drop-item { padding: 10px; font-size: 13px; cursor: pointer; background: none; color: #fff; border: none; text-align: left; }
        .drop-item:hover { background: #222; }

        #chat-box { flex: 1; overflow-y: auto; padding: 20px 15%; display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 15px; border-radius: 15px; max-width: 80%; line-height: 1.5; }
        .user { background: #222; align-self: flex-end; }
        .ai { background: #fff; color: #000; align-self: flex-start; }

        .input-area { padding: 20px 15%; background: #000; border-top: 1px solid #222; }
        .input-box { background: #111; display: flex; padding: 5px 15px; border-radius: 30px; border: 1px solid #333; }
    </style>
</head>
<body>

<div id="auth-screen" class="auth-card">
    <div style="font-size: 22px; font-weight: 900; letter-spacing: 2px;">MIRKAY-AI</div>
    <p style="color: #666; font-size: 11px; margin-bottom: 10px;">HIZLI PRO ERİŞİMİ</p>
    <input type="email" id="email" placeholder="E-posta veya Kullanıcı Adı">
    <input type="password" id="password" placeholder="Şifre">
    <button class="primary" onclick="handleAuth(false)">Kayıt Ol</button>
    <button style="background:none; color:#fff; border:1px solid #333; margin-top:8px; width:100%; padding:10px; border-radius:10px; cursor:pointer;" onclick="handleAuth(true)">Giriş Yap</button>
</div>

<div id="chat-app">
    <div class="header">
        <div style="font-weight: 900;">MIRKAY-AI</div>
        <div class="profile-container">
            <button class="p-btn" id="p-icon" onclick="toggleMenu()">M</button>
            <div class="dropdown" id="dropMenu">
                <button class="drop-item" onclick="resendMail()">📧 Onay Kodu Gönder</button>
                <button class="drop-item" style="color:#ff4d4d;" onclick="logout()">🚪 Çıkış Yap</button>
            </div>
        </div>
    </div>
    <div id="chat-box"></div>
    <div class="input-area">
        <div class="input-box">
            <input type="text" id="uInp" placeholder="Bir şeyler yaz..." style="flex:1; background:none; border:none; color:#fff; padding:10px; outline:none;" onkeypress="if(event.key==='Enter') send()">
            <button onclick="send()" style="background:#fff; border:none; border-radius:50%; width:30px; height:30px; margin:5px; cursor:pointer;">↑</button>
        </div>
    </div>
</div>

<script>
    // FİREBASE BİLGİLERİN
    const firebaseConfig = {
        apiKey: "AIzaSyABxjad9QLLdNFUd6LNTSAQQq7ImycGG1M",
        authDomain: "mirac-ai-auth.firebaseapp.com",
        projectId: "mirac-ai-auth",
        storageBucket: "mirac-ai-auth.firebasestorage.app",
        messagingSenderId: "531892620198",
        appId: "1:531892620198:web:dc2f8b1296115182f39d67"
    };
    firebase.initializeApp(firebaseConfig);

    // GROQ KEYİN
    const M_KEY = "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";

    function toggleMenu() { document.getElementById("dropMenu").classList.toggle("active"); }

    async function handleAuth(isLogin) {
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;
        try {
            if(isLogin) await firebase.auth().signInWithEmailAndPassword(email, password);
            else {
                const res = await firebase.auth().createUserWithEmailAndPassword(email, password);
                await res.user.sendEmailVerification();
                alert("Kayıt başarılı! Doğrulama maili Spam klasörüne düşmüş olabilir.");
            }
        } catch(e) { alert("Hata: " + e.message); }
    }

    firebase.auth().onAuthStateChanged((user) => {
        if (user) {
            document.getElementById("auth-screen").style.display = "none";
            document.getElementById("chat-app").style.display = "flex";
            document.getElementById("p-icon").innerText = user.email[0].toUpperCase();
        } else {
            document.getElementById("auth-screen").style.display = "block";
            document.getElementById("chat-app").style.display = "none";
        }
    });

    function logout() { firebase.auth().signOut(); }
    function resendMail() { 
        firebase.auth().currentUser.sendEmailVerification()
            .then(() => alert("Kod tekrar gönderildi. Spam kutusuna bakmayı unutma!")); 
    }

    async function send() {
        const inp = document.getElementById("uInp");
        const txt = inp.value.trim();
        if(!txt) return;

        addMsg("user", txt);
        inp.value = "";

        try {
            const r = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${M_KEY}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: "llama-3.1-8b-instant",
                    messages: [{role: "system", content: "Sen Mirkay-AI'sın."}, {role: "user", content: txt}]
                })
            });
            const d = await r.json();
            addMsg("ai", d.choices[0].message.content);
        } catch(e) { addMsg("ai", "Bağlantı hatası!"); }
    }

    function addMsg(role, text) {
        const b = document.getElementById("chat-box");
        const d = document.createElement("div");
        d.className = `msg ${role}`;
        d.innerHTML = `<b>${role==='user'?'Sen':'Mirkay-AI'}:</b><br>${text}`;
        b.appendChild(d);
        b.scrollTop = b.scrollHeight;
    }
</script>
</body>
</html>
